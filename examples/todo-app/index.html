<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TODO — openSlate smoke test</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, "Inter", system-ui, sans-serif;
        background: #fafafa;
        color: #0a0a0f;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: white;
        padding: 32px;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        width: min(420px, 90vw);
      }
      h1 { font-size: 20px; margin: 0 0 16px; letter-spacing: -0.3px; }
      input {
        width: 100%; padding: 10px 12px; font-size: 15px;
        border: 1px solid #e5e5ea; border-radius: 8px; outline: none;
      }
      input:focus { border-color: #5b5bff; box-shadow: 0 0 0 3px rgba(91,91,255,0.15); }
      button#add-btn {
        margin-top: 12px; width: 100%; padding: 10px;
        background: #5b5bff; color: white; border: 0; font-weight: 600;
        border-radius: 8px; cursor: pointer; font-size: 15px;
      }
      button#add-btn:active { transform: scale(0.98); }
      ul { list-style: none; padding: 0; margin: 16px 0 0; display: grid; gap: 8px; }
      li {
        background: #f7f7fa; padding: 10px 12px; border-radius: 8px;
        font-size: 14px; display: flex; justify-content: space-between;
      }
      li button {
        background: none; border: 0; color: #888; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>TODOs</h1>
      <input id="todo-input" placeholder="Ship a feature…" autofocus />
      <button id="add-btn">Add</button>
      <ul id="todo-list">
        <li>
          <span>Set up dev server</span>
          <button>×</button>
        </li>
        <li>
          <span>Wire up auth</span>
          <button>×</button>
        </li>
      </ul>
    </div>
    <script>
      const input = document.getElementById("todo-input");
      const btn = document.getElementById("add-btn");
      const list = document.getElementById("todo-list");
      function add() {
        const v = input.value.trim();
        if (!v) return;
        const li = document.createElement("li");
        li.innerHTML = '<span></span><button>×</button>';
        li.firstChild.textContent = v;
        list.appendChild(li);
        input.value = "";
      }
      btn.addEventListener("click", add);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") add(); });
    </script>
  </body>
</html>
